# transcard.xmu-cuisine.club -> 反代 127.0.0.1:18084 (lilibear-transcard / Python server.py)
# 先只写 HTTP，certbot --nginx 申请证书后会自动追加 443 + 跳转。
# setup-remote.sh 会把 DOMAIN 占位替换成真实域名。

server {
    server_name transcard.xmu-cuisine.club;

    # server.py 内部 MAX_UPLOAD_BYTES = 12MB
    client_max_body_size 15m;

    # Gemini 审核 ~3-10s，gpt-image-2 生成 ~30-90s；保守留 6 分钟
    proxy_read_timeout    360s;
    proxy_send_timeout    360s;
    proxy_connect_timeout 30s;

    access_log /var/log/nginx/transcard.access.log;
    error_log  /var/log/nginx/transcard.error.log;

    location / {
        proxy_pass         http://127.0.0.1:18084;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen 80;
    listen [::]:80;
}
